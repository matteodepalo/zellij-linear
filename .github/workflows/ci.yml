name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: lint + test + build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-wasip1

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: clippy (native crates)
        run: cargo clippy --workspace --exclude zellij-linear-plugin --all-targets

      - name: clippy (plugin, wasm32-wasip1)
        run: cargo clippy -p zellij-linear-plugin --target wasm32-wasip1

      - name: test (native crates)
        run: cargo test --workspace --exclude zellij-linear-plugin

      - name: test (plugin, host target)
        run: cargo test -p zellij-linear-plugin

      - name: build native CLI (release)
        run: cargo build --release -p zellij-linear

      - name: build wasm plugin (release)
        run: cargo build --release --target wasm32-wasip1 -p zellij-linear-plugin

      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zellij-linear-${{ github.sha }}
          path: |
            target/release/zellij-linear
            target/wasm32-wasip1/release/zellij-linear-plugin.wasm
          if-no-files-found: error
          retention-days: 14
