# zellij-linear — per-project configuration.
#
# Drop this file at the root of any folder you open with Zellij. The
# plugin reads it from `/host/.linear.toml` (Zellij auto-mounts the
# session cwd at `/host`). Identify the Linear project this folder
# corresponds to by EITHER `project_id` (UUID, stable) OR
# `project_name` (resolved on first run).

# REPLACE_ME: paste the project UUID from Linear (visible in the URL when
# you open the project in your browser, or via the GraphQL API).
project_id = "00000000-0000-0000-0000-000000000000"
# project_name = "Mobile app v2"

# Set to true to append diagnostics to /tmp/zellij-linear.log
# (Zellij auto-mounts the host's TMPDIR there). No-op by default.
# debug = true

[filter]
# Linear state.type enum values: backlog | unstarted | started | completed | canceled | triage.
states = ["backlog", "unstarted", "started"]
# "any" (default — every issue in the project the viewer can see),
# "me" (issues assigned to the authenticated user), or a Linear user UUID.
# assignee = "me"

[claude]
# Substring matched against PaneInfo.terminal_command to locate the
# Claude pane in the current session. Override if you launch Claude
# Code via a wrapper script.
target_command = "claude"

# false (default): paste-only — you press Enter to submit.
# true:            append `\n` so Claude auto-submits the prompt.
# Shift+C in the plugin always forces auto-submit regardless.
auto_submit = false

# Optional custom template. Available substitutions:
#   {identifier} {title} {description} {labels_as_bullets} {url}
# prompt_template = """
# I'm working on {identifier}: {title}
#
# {description}
# """
